services:
  # ─── Simply Wall St Forecast (FastAPI Web Service) ─────────────────
  - type: web
    name: simply-wallst-forecast
    runtime: python
    plan: free
    region: oregon
    rootDir: .
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn simply_app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      # Lock CORS to your own frontend domain in production, e.g.
      #   ^https://your-frontend\.onrender\.com$
      - key: CORS_ORIGIN_REGEX
        value: ".*"
